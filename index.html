<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEWS VVIP TERMINAL</title>
    <meta http-equiv="refresh" content="1">
    <style>
        body { background: #000; color: #ffcc00; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 2px solid #ffcc00; padding: 20px; max-width: 900px; margin: auto; background: #050505; }
        .news-header { border: 1px dashed #ffcc00; padding: 15px; text-align: center; margin-bottom: 20px; }
        .countdown { font-size: 60px; color: #ff0000; font-weight: bold; margin: 10px 0; }
        .price { font-size: 50px; color: #fff; text-align: center; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: center; }
        .box { border: 1px solid #333; padding: 10px; background: #0a0a0a; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="news-header">
            <div style="font-size: 14px; color: #888;">PROCHAINE NEWS USD (HIGH/MEDIUM)</div>
            <div style="font-size: 20px; margin-top: 5px;">{{NEWS_NAME}}</div>
            <div class="countdown">{{COUNTDOWN}}</div>
        </div>

        <div class="price">$ {{PRICE}}</div>

        <div class="data-grid">
            <div class="box">ORDER BOOK : <span style="color: #00ff00;">{{OB}}</span></div>
            <div class="box">STATUS : <span style="color: #fff;">NEWS SCANNING</span></div>
        </div>
    </div>
</body>
</html>
