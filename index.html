<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL VVIP - MC ANTHONIO</title>
    <meta http-equiv="refresh" content="30">
    <style>
        body { background: #000; color: #ffcc00; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .terminal { border: 1px solid #333; background: #050505; padding: 20px; border-radius: 8px; max-width: 900px; margin: auto; }
        .header { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 14px; }
        .chart-box { width: 100%; height: 400px; margin: 20px 0; border: 1px solid #222; }
        .price-big { font-size: 50px; color: #fff; text-align: center; margin: 20px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { border: 1px solid #222; padding: 15px; background: #0a0a0a; border-left: 3px solid #ffcc00; }
        .summary { margin-top: 20px; padding: 15px; border-left: 4px solid #ffcc00; background: #111; font-size: 13px; color: #ccc; }
        .btn { display: block; background: #ffcc00; color: #000; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <span>MC ANTHONIO INSTITUTIONAL v6.0</span>
            <span style="color:#fff;">{{TIME}} (MG)</span>
        </div>

        <div class="chart-box">
            <div id="tv_chart"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "width": "100%", "height": 400, "symbol": "OANDA:XAUUSD",
                    "interval": "15", "theme": "dark", "style": "1", "locale": "fr", "container_id": "tv_chart"
                });
            </script>
        </div>

        <div class="price-big">$ {{PRICE}}</div>

        <div class="grid">
            <div class="box">
                <div style="font-size:10px; color:#666; margin-bottom:5px;">SENTIMENT RETAIL</div>
                <div style="color:#ff4444; font-size:18px; font-weight:bold;">{{SENTIMENT}}% SHORT</div>
            </div>
            <div class="box">
                <div style="font-size:10px; color:#666; margin-bottom:5px;">BIAIS COT</div>
                <div style="color:#00ff00; font-size:18px; font-weight:bold;">{{COT_BIAS}}</div>
            </div>
        </div>

        <div class="summary">
            <div style="font-weight:bold; color:#ffcc00; margin-bottom:5px;">RÉSUMÉ D'ANALYSE DU JOUR</div>
            {{DAY_SUMMARY}}
        </div>

        <a href="https://t.me/mcanthonio" class="btn">ACCÉDER AU SIGNAL SNIPER VVIP</a>
    </div>
</body>
                </html>
