<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <title>MC ANTHONIO - VVIP TERMINAL</title>
    <meta http-equiv="refresh" content="30">
    <style>
        body { background: #000; color: #ffcc00; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .terminal { border: 1px solid #333; background: #050505; padding: 20px; border-radius: 5px; max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
        .status { color: #00ff00; font-size: 12px; margin: 10px 0; }
        .price-box { font-size: 70px; color: #fff; text-align: center; margin: 30px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box { background: #0a0a0a; border: 1px solid #222; padding: 15px; }
        .report { margin-top: 20px; background: #111; padding: 15px; border-left: 4px solid #ffcc00; }
        .btn-vvip { display: block; background: #ffcc00; color: #000; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <span>MC ANTHONIO INSTITUTIONAL v6.0</span>
            <span>{{TIME}} (MG)</span>
        </div>
        <div class="status">● ANALYSE EN COURS : JUDAS MODEL SCANNER</div>
        <div class="price-box">$ {{PRICE}}</div>
        <div class="grid">
            <div class="box">
                <div style="font-size: 10px; color: #666;">SENTIMENT RETAIL</div>
                <div style="font-size: 18px; color: #ff4444;">{{SENTIMENT}}% SHORT</div>
            </div>
            <div class="box">
                <div style="font-size: 10px; color: #666;">BIAIS COT</div>
                <div style="font-size: 18px;">{{COT_BIAS}}</div>
            </div>
        </div>
        <div class="report">
            <div style="font-weight: bold; margin-bottom: 5px;">RÉSUMÉ D'ANALYSE DU JOUR</div>
            <div style="color: #ccc; font-size: 13px;">{{DAY_SUMMARY}}</div>
        </div>
        <a href="https://t.me/mcanthonio" class="btn-vvip">TSINDRIO ETO RAHA TE HAHITA NY SIGNAL FENO</a>
    </div>
</body>
            </html>
